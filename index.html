<!DOCTYPE html>
<html>
<head>
    <title>sbfb Studio</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; }
        h1 { margin-top: 0; font-size: 24px; color: #4CAF50; display: inline-block; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .api-container { display: flex; gap: 10px; }
        .api-input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #2d2d2d; color: white; width: 280px; }
        .save-btn { background-color: #008CBA; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .save-btn:hover { background-color: #007bb5; }
        
        .workspace { display: flex; gap: 20px; height: calc(100vh - 120px); }
        .panel { flex: 1; display: flex; flex-direction: column; }
        
        textarea { flex: 1; background-color: #2d2d2d; color: #d4d4d4; font-family: 'Courier New', Courier, monospace; font-size: 15px; padding: 15px; border: 1px solid #444; border-radius: 5px; resize: none; outline: none; }
        .btn { background-color: #4CAF50; color: white; padding: 12px 20px; border: none; cursor: pointer; font-size: 16px; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        .btn:hover { background-color: #45a049; }
        
        .preview-header { background: #333; padding: 5px 15px; border-radius: 5px 5px 0 0; font-size: 14px; font-weight: bold; color: #ccc; }
        .browser-preview { flex: 1.5; background-color: #ffffff; border: none; border-radius: 0 0 5px 5px; margin-bottom: 20px; width: 100%; }
        
        .terminal { flex: 1; background-color: #000000; color: #00FF00; padding: 15px; font-family: monospace; white-space: pre-wrap; overflow-y: auto; border-radius: 5px 5px 0 0; border: 1px solid #333; border-bottom: none; }
        
        .chat-bar { display: none; background: #222; padding: 10px; border: 1px solid #333; border-top: none; border-radius: 0 0 5px 5px; }
        .chat-input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #111; color: #00d2ff; font-family: monospace; }
        .chat-btn { background: #00d2ff; color: #000; font-weight: bold; border: none; padding: 8px 15px; margin-left: 10px; border-radius: 4px; cursor: pointer; }
        
        .ai-text { color: #00d2ff; font-weight: bold; }
        .error-text { color: #ff5555; }
        .var-text { color: #ffb86c; } /* Color for variable outputs */
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>sbfb Studio</h1>
        <div class="api-container">
            <input type="password" id="groqApiKey" class="api-input" placeholder="Paste Groq API Key here (Secure)">
            <button class="save-btn" onclick="saveApiKey()">Save Key</button>
        </div>
    </div>

    <div class="workspace">
        <div class="panel">
            <textarea id="codeInput" spellcheck="false">
start:SBFB
frontend

type ("--- Testing SBFB Memory ---")

let myName = "Creator"
let loopCount = 3

type ("Welcome to the system, ")
type (myName)

type ("")
type ("--- Testing SBFB Loops ---")

repeat loopCount {
    type ("SBFB is looping!")
}

<end:SBFB></textarea>
            <button class="btn" onclick="runSBFB()">Run sbfb Code</button>
        </div>

        <div class="panel">
            <div class="preview-header">Live Web Preview</div>
            <iframe id="webPreview" class="browser-preview"></iframe>

            <div class="preview-header">Terminal Output</div>
            <div class="terminal" id="outputScreen">Waiting for code...</div>
            
            <div class="chat-bar" id="aiChatBox">
                <input type="text" id="userChatMsg" class="chat-input" placeholder="Chat with Isaahi AI...">
                <button class="chat-btn" onclick="chatWithIsaahi()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- API KEY STORAGE ---
        window.onload = function() {
            const savedKey = localStorage.getItem("sbfb_api_key");
            if (savedKey) document.getElementById("groqApiKey").value = savedKey;
        };

        function saveApiKey() {
            const key = document.getElementById("groqApiKey").value;
            if (key) {
                localStorage.setItem("sbfb_api_key", key);
                alert("API Key securely saved to your browser!");
            } else {
                alert("Please paste a key first.");
            }
        }

        // --- AI API CALLS ---
        let currentAiPrompt = "";
        let chatHistory = [];

        async function callGroqAPI(systemPrompt, userMessage) {
            const apiKey = document.getElementById("groqApiKey").value;
            if (!apiKey) throw new Error("Missing Groq API Key! Please paste it at the top.");

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama3-8b-8192", 
                    messages: [ { role: "system", content: systemPrompt }, ...chatHistory, { role: "user", content: userMessage } ]
                })
            });

            if (!response.ok) throw new Error(`Groq API Error: ${response.status}`);
            const data = await response.json();
            const aiMessage = data.choices[0].message.content;
            
            chatHistory.push({ role: "user", content: userMessage });
            chatHistory.push({ role: "assistant", content: aiMessage });
            return aiMessage;
        }

        // --- CORE SBFB ENGINE ---
        async function runSBFB() {
            saveApiKey(); 

            const code = document.getElementById("codeInput").value;
            const terminal = document.getElementById("outputScreen");
            const preview = document.getElementById("webPreview");
            const chatBox = document.getElementById("aiChatBox");
            
            terminal.innerHTML = "--- Running sbfb Program ---\n";
            chatBox.style.display = "none"; 
            chatHistory = []; 
            
            let htmlContent = ""; let jsContent = "";
            let isRunning = false;
            
            // --- NEW: SBFB MEMORY SYSTEM ---
            let memory = {}; 
            const allLines = code.split('\n');

            // We wrap the parser in an async function so it can call itself for loops!
            async function processLines(linesArray) {
                let isBrainMode = false, isCapturingPrompt = false;
                let isPythonMode = false, isHtmlMode = false, isJsMode = false;
                let aiPrompt = "";

                for (let i = 0; i < linesArray.length; i++) {
                    let line = linesArray[i].trim();
                    let lowerLine = line.toLowerCase();
                    let rawLine = linesArray[i]; 
                    
                    if (line === "") continue;

                    if (lowerLine === "start:sbfb") { isRunning = true; continue; }
                    if (lowerLine === "<end>" || lowerLine === "<end:sbfb>") {
                        if (linesArray === allLines) terminal.innerHTML += "--- Program Finished ---\n";
                        isRunning = false; break;
                    }

                    if (isRunning) {
                        // --- 1. VARIABLE ASSIGNMENT (let x = 10) ---
                        if (lowerLine.startsWith("let ") && line.includes("=")) {
                            let parts = line.substring(4).split("=");
                            let varName = parts[0].trim();
                            let varVal = parts[1].trim();
                            
                            // Strip quotes if it's a string
                            if (varVal.startsWith('"') && varVal.endsWith('"')) {
                                varVal = varVal.substring(1, varVal.length - 1);
                            } else if (!isNaN(varVal)) {
                                varVal = Number(varVal); // Save as an actual number
                            } else if (memory[varVal] !== undefined) {
                                varVal = memory[varVal]; // Assign another variable to this one
                            }
                            
                            memory[varName] = varVal; // Save to memory!
                            continue;
                        }

                        // --- 2. REPEAT LOOPS ---
                        if (lowerLine.startsWith("repeat ") && lowerLine.endsWith("{")) {
                            let countStr = lowerLine.substring(7, lowerLine.length - 1).trim();
                            // Check if the count is a number, or a variable stored in memory!
                            let count = isNaN(countStr) ? memory[countStr] : parseInt(countStr);
                            
                            if (count === undefined) {
                                terminal.innerHTML += `<span class="error-text">Loop Error: Cannot repeat '${countStr}' times.</span>\n`;
                                continue;
                            }

                            // Gather the lines inside the loop brackets
                            let loopBody = [];
                            let brackets = 1;
                            i++; // Move to next line
                            
                            while(i < linesArray.length && brackets > 0) {
                                let innerLine = linesArray[i].trim();
                                if (innerLine.endsWith("{")) brackets++;
                                if (innerLine === "}") brackets--;
                                
                                if (brackets > 0) loopBody.push(linesArray[i]);
                                i++;
                            }
                            i--; // Step back so the main loop doesn't skip a line

                            // Execute the block!
                            for (let c = 0; c < count; c++) {
                                await processLines(loopBody);
                            }
                            continue;
                        }

                        // --- 3. STANDARD SBFB COMMANDS ---
                        let noSpaceSbfb = line.replace(/\s+/g, '');
                        
                        // Print literal strings: type ("hello")
                        if (noSpaceSbfb.startsWith('type("') && noSpaceSbfb.endsWith('")')) {
                            let firstQ = line.indexOf('"'); let lastQ = line.lastIndexOf('"');
                            terminal.innerHTML += line.substring(firstQ + 1, lastQ) + "\n";
                            continue;
                        } 
                        // Print variables: type (myName)
                        else if (noSpaceSbfb.startsWith('type(') && noSpaceSbfb.endsWith(')')) {
                            let varName = noSpaceSbfb.substring(5, noSpaceSbfb.length - 1);
                            if (memory[varName] !== undefined) {
                                terminal.innerHTML += `<span class="var-text">${memory[varName]}</span>\n`;
                            } else {
                                terminal.innerHTML += `<span class="error-text">SBFB Error: '${varName}' is not defined</span>\n`;
                            }
                            continue;
                        }

                        // --- ENVIRONMENT RULES ---
                        if (lowerLine === "idk") { terminal.innerHTML += "[System Note: Environment UNKNOWN]\n"; continue; }
                        if (lowerLine === "frontend") { terminal.innerHTML += "[System Note: Environment FRONTEND]\n"; continue; }
                        if (lowerLine === "backend") { terminal.innerHTML += "[System Note: Environment BACKEND]\n"; continue; }

                        // --- AI BRAIN ---
                        if (lowerLine === "insert:tool brain ai" || lowerLine === "import:tool brain ai") {
                            terminal.innerHTML += `[System Note: Initializing Isaahi AI Brain...]\n`;
                            isBrainMode = true; isPythonMode = false; isHtmlMode = false; isJsMode = false;
                            continue; 
                        }

                        if (isBrainMode) {
                            if (line === "{") { isCapturingPrompt = true; continue; }
                            if (line === "}") { 
                                isCapturingPrompt = false; currentAiPrompt = aiPrompt; 
                                terminal.innerHTML += `[System Note: Personality prompt for Isaahi AI registered. Chat unlocked!]\n`;
                                chatBox.style.display = "flex"; continue; 
                            }
                            if (isCapturingPrompt) { aiPrompt += rawLine + "\n"; continue; }
                            // ... AI Crawl Logic
                            if (lowerLine.startsWith("tool:crawl [") && line.endsWith("]")) {
                                let url = line.substring(12, line.length - 1);
                                terminal.innerHTML += `[System Note: Tool Triggered. Crawling ${url}...]\n`;
                                try {
                                    terminal.innerHTML += `<span style="color:gray;" id="loadingIndicator">Isaahi is thinking...</span>\n`;
                                    let aiResponse = await callGroqAPI(aiPrompt, `I just ran a crawl tool on ${url}. Acknowledge this and tell me you are ready to help.`);
                                    document.getElementById("loadingIndicator").remove();
                                    terminal.innerHTML += `<span class="ai-text">\nIsaahi AI: ${aiResponse}</span>\n\n`;
                                } catch (error) {
                                    if (document.getElementById("loadingIndicator")) document.getElementById("loadingIndicator").remove();
                                    terminal.innerHTML += `<span class="error-text">${error.message}</span>\n`;
                                }
                                continue;
                            }
                        }

                        // --- MODE SWITCHERS ---
                        if ((lowerLine.startsWith("insert python (") || lowerLine.startsWith("import:python (")) && line.endsWith(")")) {
                            let prefix = lowerLine.startsWith("insert") ? 15 : 15;
                            let filename = line.substring(prefix, line.length - 1);
                            terminal.innerHTML += `[System Note: Loading Python script '${filename}']\n`;
                            isPythonMode = true; isHtmlMode = false; isJsMode = false; isBrainMode = false; continue; 
                        }
                        if ((lowerLine.startsWith("insert html (") || lowerLine.startsWith("import:html (")) && line.endsWith(")")) {
                            isHtmlMode = true; isPythonMode = false; isJsMode = false; isBrainMode = false; continue; 
                        }
                        if ((lowerLine.startsWith("insert javascript (") || lowerLine.startsWith("import:javascript (")) && line.endsWith(")")) {
                            isJsMode = true; isHtmlMode = false; isPythonMode = false; isBrainMode = false; continue; 
                        }

                        if (isPythonMode) {
                            let noSpaceLine = line.replace(/\s+/g, ''); 
                            if (noSpaceLine.startsWith('print("') && noSpaceLine.endsWith('")')) {
                                let firstQuote = line.indexOf('"'); let lastQuote = line.lastIndexOf('"');
                                terminal.innerHTML += line.substring(firstQuote + 1, lastQuote) + "\n";
                            }
                            continue;
                        }

                        if (isHtmlMode) { htmlContent += rawLine + "\n"; continue; }
                        if (isJsMode) { jsContent += rawLine + "\n"; continue; }
                    }
                }
            }

            // Start the parser with all the lines!
            await processLines(allLines);

            // Inject compiled web code
            let finalWebCode = htmlContent + "\n<script>" + jsContent + "<\/script>";
            preview.srcdoc = finalWebCode;
        }

        // --- CHAT WITH ISAAHI ---
        async function chatWithIsaahi() {
            const inputField = document.getElementById("userChatMsg");
            const terminal = document.getElementById("outputScreen");
            const userMsg = inputField.value;

            if (!userMsg) return;
            terminal.innerHTML += `\nYou: ${userMsg}\n`;
            inputField.value = ""; 

            try {
                terminal.innerHTML += `<span style="color:gray;" id="chatLoadingIndicator">Isaahi is typing...</span>\n`;
                terminal.scrollTop = terminal.scrollHeight; 
                let aiResponse = await callGroqAPI(currentAiPrompt, userMsg);
                document.getElementById("chatLoadingIndicator").remove();
                terminal.innerHTML += `<span class="ai-text">Isaahi AI: ${aiResponse}</span>\n\n`;
                terminal.scrollTop = terminal.scrollHeight; 
            } catch (error) {
                if (document.getElementById("chatLoadingIndicator")) document.getElementById("chatLoadingIndicator").remove();
                terminal.innerHTML += `<span class="error-text">${error.message}</span>\n\n`;
            }
        }
    </script>
</body>
</html>
