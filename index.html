<!DOCTYPE html>
<html>
<head>
    <title>SBFB Type Studio</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #1e1e1e; color: #fff; }
        .workspace { display: flex; gap: 20px; height: 90vh; }
        .panel { flex: 1; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #2d2d2d; color: #d4d4d4; padding: 15px; border: 1px solid #444; font-family: monospace; resize: none; outline: none; }
        .terminal { flex: 1; background: #000; color: #00FF00; padding: 15px; font-family: monospace; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; }
        .btn { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .api-bar { margin-bottom: 10px; display: flex; gap: 10px; }
        .api-bar input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 5px; flex: 1; }
    </style>
</head>
<body>
    <div class="api-bar">
        <input type="password" id="groqApiKey" placeholder="Enter Groq API Key">
        <button onclick="runSBFB()" class="btn" style="margin:0;">Run Code</button>
    </div>
    <div class="workspace">
        <div class="panel">
            <textarea id="codeInput" spellcheck="false">start:SBFB
type ("Hello SBFB!")
<end:SBFB></textarea>
        </div>
        <div class="panel">
            <iframe id="webPreview" style="background:white; height:50%; border:none;"></iframe>
            <div id="outputScreen" class="terminal">Terminal ready...</div>
        </div>
    </div>

    <script>
        // --- URL LOADER ---
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const sharedCode = params.get('code');
            if (sharedCode) {
                document.getElementById("codeInput").value = decodeURIComponent(sharedCode);
                runSBFB();
            }
        };

        async function runSBFB() {
            const code = document.getElementById("codeInput").value;
            const terminal = document.getElementById("outputScreen");
            const preview = document.getElementById("webPreview");
            terminal.innerHTML = "--- Running SBFB ---\n";
            
            let memory = {};
            const lines = code.split('\n');
            let isRunning = false;

            for (let line of lines) {
                let clean = line.trim();
                if (clean.toLowerCase() === "start:sbfb") { isRunning = true; continue; }
                if (clean.toLowerCase() === "<end:sbfb>") break;
                
                if (isRunning) {
                    if (clean.startsWith('type ("')) {
                        terminal.innerHTML += clean.split('"')[1] + "\n";
                    }
                    if (clean.startsWith('let ')) {
                        let parts = clean.substring(4).split('=');
                        memory[parts[0].trim()] = parts[1].trim().replace(/"/g, '');
                    }
                }
            }
            terminal.innerHTML += "--- Finished ---";
        }
    </script>
</body>
</html>
